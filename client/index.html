<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client — My Digital ID Page</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f; color: #e2e8f0;
      padding: 20px;
    }
    .container { max-width: 960px; margin: 0 auto; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .header h1 { font-size:1.3rem; }
    .header h1 span { color:#8B5CF6; }
    .badge { font-size:0.75rem; background:rgba(255,255,255,0.06); padding:4px 12px; border-radius:20px; color:#64748b; }

    .btn {
      padding:10px 20px; border:none; border-radius:10px;
      font-weight:600; cursor:pointer; font-size:0.9rem;
      transition:0.2s; display:inline-flex; align-items:center; gap:6px;
    }
    .btn-primary { background:#8B5CF6; color:#fff; }
    .btn-primary:hover { filter:brightness(1.1); }
    .btn-sm { padding:6px 12px; font-size:0.8rem; }
    .btn-wa { background:#25D366; color:#fff; }
    .btn-wa:hover { filter:brightness(1.1); }
    .btn-outline { background:transparent; border:1px solid rgba(255,255,255,0.1); color:#94a3b8; }
    .btn-outline:hover { border-color:#8B5CF6; color:#8B5CF6; }
    .btn-danger { background:#ef4444; color:#fff; }
    .btn-success { background:#10b981; color:#fff; }

    .stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:12px; margin-bottom:24px; }
    .stat-card { background:linear-gradient(135deg,#13132a,#1a1a35); border:1px solid rgba(255,255,255,0.06); border-radius:12px; padding:16px; text-align:center; }
    .stat-card .angka { font-size:1.8rem; font-weight:800; color:#8B5CF6; }
    .stat-card .label { font-size:0.75rem; color:#64748b; text-transform:uppercase; letter-spacing:0.05em; margin-top:4px; }

    .toolbar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .search-box {
      flex:1; min-width:200px;
      padding:10px 14px; border:1px solid rgba(255,255,255,0.08);
      border-radius:10px; background:rgba(255,255,255,0.03);
      color:#e2e8f0; font-size:0.9rem; outline:none;
    }
    .search-box:focus { border-color:#8B5CF6; }

    .table-wrap {
      background:linear-gradient(135deg,#13132a,#1a1a35);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:16px; overflow:hidden;
    }
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; padding:12px 16px; font-size:0.75rem; color:#64748b; text-transform:uppercase; letter-spacing:0.05em; border-bottom:1px solid rgba(255,255,255,0.06); }
    td { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.03); font-size:0.9rem; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:rgba(255,255,255,0.02); }

    .status {
      display:inline-block; padding:3px 10px; border-radius:20px;
      font-size:0.75rem; font-weight:600;
    }
    .status-aktif { background:rgba(16,185,129,0.1); color:#10b981; }
    .status-selesai { background:rgba(100,116,139,0.1); color:#64748b; }
    .status-dibatalkan { background:rgba(239,68,68,0.1); color:#ef4444; }

    .paket-badge {
      display:inline-block; padding:2px 8px; border-radius:6px;
      font-size:0.75rem; font-weight:600;
    }
    .paket-basic { background:rgba(139,92,246,0.1); color:#a78bfa; }
    .paket-pro { background:rgba(59,130,246,0.1); color:#60a5fa; }
    .paket-premium { background:rgba(245,158,11,0.1); color:#fbbf24; }
    .paket-kustom { background:rgba(236,72,153,0.1); color:#f472b6; }

    .actions { display:flex; gap:4px; }
    .actions .btn { padding:4px 8px; font-size:0.75rem; }

    .empty { text-align:center; padding:60px 20px; color:#475569; }
    .empty .icon { font-size:3rem; margin-bottom:8px; }

    /* Modal */
    .modal-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
      align-items:center; justify-content:center; z-index:1000;
      padding:20px;
    }
    .modal-overlay.active { display:flex; }
    .modal {
      background:#13132a; border:1px solid rgba(255,255,255,0.08);
      border-radius:16px; padding:24px; max-width:500px; width:100%;
      max-height:90vh; overflow-y:auto;
    }
    .modal h2 { font-size:1.1rem; margin-bottom:20px; color:#fff; }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:0.8rem; color:#64748b; margin-bottom:6px; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:10px 12px; border:1px solid rgba(255,255,255,0.08);
      border-radius:10px; background:rgba(255,255,255,0.03);
      color:#e2e8f0; font-size:0.9rem; outline:none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color:#8B5CF6;
    }
    .form-group textarea { resize:vertical; min-height:60px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }

    .notif {
      position:fixed; top:20px; left:50%; transform:translateX(-50%);
      padding:12px 24px; border-radius:12px;
      font-weight:600; font-size:0.9rem; z-index:2000;
      transition:0.3s; display:none;
    }
    .notif-success { background:#064e3b; color:#34d399; display:block; }
    .notif-error { background:#7f1d1d; color:#f87171; display:block; }

    .loading { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ============ LOGIN SCREEN ============ */
    .login-screen {
      position:fixed; inset:0; background:#0a0a0f;
      display:flex; align-items:center; justify-content:center;
      z-index:9999; padding:20px;
    }
    .login-box {
      background:linear-gradient(135deg,#13132a,#1a1a35);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:20px; padding:40px 32px;
      max-width:380px; width:100%; text-align:center;
    }
    .login-box .lock-icon {
      font-size:2.5rem; margin-bottom:12px;
    }
    .login-box h2 {
      font-size:1.2rem; color:#e2e8f0; margin-bottom:4px;
    }
    .login-box p {
      font-size:0.85rem; color:#64748b; margin-bottom:24px;
    }
    .login-box input[type="password"] {
      width:100%; padding:14px 16px;
      border:1px solid rgba(255,255,255,0.1);
      border-radius:12px; background:rgba(255,255,255,0.03);
      color:#e2e8f0; font-size:1.1rem; text-align:center;
      outline:none; margin-bottom:16px; letter-spacing:4px;
    }
    .login-box input[type="password"]:focus {
      border-color:#8B5CF6;
    }
    .login-box .login-error {
      color:#ef4444; font-size:0.8rem; margin-top:-8px; margin-bottom:12px; display:none;
    }
    .login-box .btn {
      width:100%; padding:14px; font-size:1rem;
    }
  </style>
</head>
<body>

  <!-- ============ LOGIN SCREEN ============ -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="lock-icon">🔐</div>
      <h2>Akses Terbatas</h2>
      <p>Masukkan PIN untuk mengakses data client</p>
      <input type="password" id="pinInput" placeholder="****" maxlength="6" inputmode="numeric" onkeydown="if(event.key==='Enter')checkPin()">
      <div class="login-error" id="loginError">PIN salah, coba lagi</div>
      <button class="btn btn-primary" onclick="checkPin()">Masuk</button>
    </div>
  </div>

  <!-- ============ MAIN CONTENT ============ -->
  <div class="container" id="mainContent" style="display:none">
    <!-- Header -->
    <div class="header">
      <div>
        <h1>📋 <span>Client</span> Management</h1>
        <div class="badge">My Digital ID Page</div>
      </div>
      <div style="display:flex;gap:8px">
        <a href="../invoice/" class="btn btn-outline">🧾 Invoice</a>
        <a href="../" class="btn btn-outline">← Website</a>
        <button class="btn btn-sm btn-outline" onclick="lockScreen()" style="color:#ef4444;border-color:#ef4444">🔒 Kunci</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats" id="stats"></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input class="search-box" id="searchInput" placeholder="Cari client..." oninput="renderTable()">
      <button class="btn btn-primary" onclick="openModal()">+ Tambah Client</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nama</th>
            <th>Usaha</th>
            <th>WA</th>
            <th>Paket</th>
            <th>Harga</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="clientTable"></tbody>
      </table>
      <div class="empty" id="emptyState">
        <div class="icon">📋</div>
        <p>Belum ada client. Klik "Tambah Client" untuk mulai!</p>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2 id="modalTitle">Tambah Client</h2>
      <input type="hidden" id="editId">
      
      <div class="form-row">
        <div class="form-group">
          <label>Nama Client *</label>
          <input id="fNama" placeholder="Nama lengkap">
        </div>
        <div class="form-group">
          <label>Nama Usaha</label>
          <input id="fUsaha" placeholder="Nama toko/bisnis">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>No. WhatsApp</label>
          <input id="fWa" placeholder="628xxx" type="tel">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="fEmail" placeholder="email@example.com" type="email">
        </div>
      </div>

      <div class="form-group">
        <label>Alamat</label>
        <input id="fAlamat" placeholder="Alamat usaha">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Paket</label>
          <select id="fPaket">
            <option value="basic">Basic — Rp99.000/thn</option>
            <option value="pro">Pro — Rp249.000/thn</option>
            <option value="premium">Premium — Rp499.000/thn</option>
            <option value="kustom">Kustom</option>
          </select>
        </div>
        <div class="form-group">
          <label>Harga (Rp)</label>
          <input id="fHarga" type="number" placeholder="99000">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select id="fStatus">
            <option value="aktif">Aktif</option>
            <option value="selesai">Selesai</option>
            <option value="dibatalkan">Dibatalkan</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tanggal Mulai</label>
          <input id="fTglMulai" type="date">
        </div>
      </div>

      <div class="form-group">
        <label>Catatan</label>
        <textarea id="fCatatan" placeholder="Catatan tentang client..."></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">Batal</button>
        <button class="btn btn-primary" onclick="saveClient()" id="btnSave">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Notifikasi -->
  <div id="notif" class="notif"></div>

  <script>
    // ============ PIN AUTH ============
    // PIN default: 123456 — bisa diganti di localStorage
    // Cara ganti PIN: buka console browser, ketik setPin('123456')

    function getPinHash(pin) {
      // Simple hash — bukan kriptografi, cukup buat jaga dari orang iseng
      let hash = 0;
      for (let i = 0; i < pin.length; i++) {
        const char = pin.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash; // Convert to 32bit integer
      }
      return 'pin_' + Math.abs(hash).toString(36);
    }

    function getSavedPin() {
      return localStorage.getItem('mid_pin') || getPinHash('123456');
    }

    function setPin(newPin) {
      if (newPin.length < 4) { alert('PIN minimal 4 digit'); return; }
      localStorage.setItem('mid_pin', getPinHash(newPin));
      alert('PIN berhasil diganti!');
    }

    function checkPin() {
      const input = document.getElementById('pinInput').value;
      if (getPinHash(input) === getSavedPin()) {
        sessionStorage.setItem('mid_auth', '1');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        loadClients();
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('pinInput').value = '';
        document.getElementById('pinInput').focus();
      }
    }

    function lockScreen() {
      sessionStorage.removeItem('mid_auth');
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('pinInput').value = '';
      document.getElementById('pinInput').focus();
      document.getElementById('loginError').style.display = 'none';
    }

    // Auto-login if already authed this session
    if (sessionStorage.getItem('mid_auth') === '1') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    }

    // ============ CLIENT MANAGEMENT ============
    let clients = [];

    function notif(msg, type = 'success') {
      const el = document.getElementById('notif');
      el.textContent = msg;
      el.className = 'notif notif-' + type;
      setTimeout(() => el.className = 'notif', 3000);
    }

    function rupiah(n) {
      return 'Rp' + Number(n).toLocaleString('id-ID');
    }

    function openModal(data = null) {
      document.getElementById('modal').classList.add('active');
      document.getElementById('modalTitle').textContent = data ? 'Edit Client' : 'Tambah Client';
      document.getElementById('btnSave').textContent = data ? 'Simpan' : 'Tambah';
      document.getElementById('editId').value = data ? data.id : '';

      document.getElementById('fNama').value = data ? data.nama : '';
      document.getElementById('fUsaha').value = data ? data.usaha : '';
      document.getElementById('fWa').value = data ? data.no_wa : '';
      document.getElementById('fEmail').value = data ? data.email : '';
      document.getElementById('fAlamat').value = data ? data.alamat : '';
      document.getElementById('fPaket').value = data ? data.paket : 'basic';
      document.getElementById('fHarga').value = data ? data.harga : '';
      document.getElementById('fStatus').value = data ? data.status : 'aktif';
      document.getElementById('fTglMulai').value = data ? data.tgl_mulai : new Date().toISOString().split('T')[0];
      document.getElementById('fCatatan').value = data ? data.catatan : '';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    async function saveClient() {
      const id = document.getElementById('editId').value;
      const data = {
        nama: document.getElementById('fNama').value.trim(),
        usaha: document.getElementById('fUsaha').value.trim(),
        no_wa: document.getElementById('fWa').value.trim(),
        email: document.getElementById('fEmail').value.trim(),
        alamat: document.getElementById('fAlamat').value.trim(),
        paket: document.getElementById('fPaket').value,
        harga: parseInt(document.getElementById('fHarga').value) || 0,
        status: document.getElementById('fStatus').value,
        tgl_mulai: document.getElementById('fTglMulai').value,
        catatan: document.getElementById('fCatatan').value.trim(),
      };

      if (!data.nama) { notif('Nama client wajib diisi', 'error'); return; }

      try {
        if (id) {
          await supabase.from('clients').update(data).eq('id', id);
          notif('✅ Client diupdate');
        } else {
          await supabase.from('clients').insert(data);
          notif('✅ Client ditambahkan');
        }
        closeModal();
        loadClients();
      } catch (e) { notif('Error: ' + e.message, 'error'); }
    }

    async function deleteClient(id, nama) {
      if (!confirm(`Hapus client "${nama}"?`)) return;
      await supabase.from('clients').delete().eq('id', id);
      notif('Client dihapus');
      loadClients();
    }

    async function loadClients() {
      try {
        const { data } = await supabase.from('clients').select('*').order('created_at', { ascending: false });
        clients = data || [];
      } catch (e) {
        clients = [];
      }
      renderStats();
      renderTable();
    }

    function renderStats() {
      const total = clients.length;
      const aktif = clients.filter(c => c.status === 'aktif').length;
      const selesai = clients.filter(c => c.status === 'selesai').length;
      const totalPendapatan = clients.reduce((sum, c) => sum + (c.harga || 0), 0);

      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="angka">${total}</div><div class="label">Total Client</div></div>
        <div class="stat-card"><div class="angka">${aktif}</div><div class="label">Aktif</div></div>
        <div class="stat-card"><div class="angka">${selesai}</div><div class="label">Selesai</div></div>
        <div class="stat-card"><div class="angka">${rupiah(totalPendapatan)}</div><div class="label">Total Pendapatan</div></div>
      `;
    }

    function renderTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = clients.filter(c =>
        c.nama.toLowerCase().includes(q) ||
        (c.usaha || '').toLowerCase().includes(q) ||
        (c.no_wa || '').includes(q)
      );

      const tbody = document.getElementById('clientTable');
      const empty = document.getElementById('emptyState');

      if (filtered.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      const paketLabel = { basic:'Basic', pro:'Pro', premium:'Premium', kustom:'Kustom' };
      const paketClass = { basic:'paket-basic', pro:'paket-pro', premium:'paket-premium', kustom:'paket-kustom' };

      tbody.innerHTML = filtered.map(c => {
        const safeJson = JSON.stringify(c).replace(/'/g, "&#39;").replace(/"/g, "&quot;");
        return `
        <tr>
          <td><strong>${c.nama}</strong></td>
          <td style="color:#94a3b8">${c.usaha || '—'}</td>
          <td>
            ${c.no_wa
              ? `<a href="https://wa.me/${c.no_wa}" target="_blank" style="color:#25D366;text-decoration:none;font-size:0.85rem">${c.no_wa}</a>`
              : '<span style="color:#475569">—</span>'}
          </td>
          <td><span class="paket-badge ${paketClass[c.paket] || 'paket-basic'}">${paketLabel[c.paket] || c.paket}</span></td>
          <td style="color:#e2e8f0;font-weight:600">${rupiah(c.harga)}</td>
          <td><span class="status status-${c.status}">${c.status}</span></td>
          <td>
            <div class="actions">
              <button class="btn btn-sm btn-primary" onclick='openModal(${safeJson})'>✎</button>
              ${c.no_wa ? `<a href="https://wa.me/${c.no_wa}?text=Halo%20${encodeURIComponent(c.nama)}%2C%20ini%20dari%20My%20Digital%20ID%20Page" target="_blank" class="btn btn-sm btn-wa">💬</a>` : ''}
              <button class="btn btn-sm btn-danger" onclick="deleteClient(${c.id},'${c.nama.replace(/'/g, "\\'")}')">✕</button>
            </div>
          </td>
        </tr>
      `}).join('');
    }

    // Close modal on overlay click
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Load clients only if authed
    if (sessionStorage.getItem('mid_auth') === '1') {
      loadClients();
    }
  </script>
</body>
</html>
